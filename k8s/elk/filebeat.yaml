---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
- apiGroups: [""]
  resources: ["namespaces", "pods", "nodes"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
- kind: ServiceAccount
  name: filebeat
  namespace: default
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: infoline-filebeat
  namespace: default
spec:
  type: filebeat
  version: 9.4.3
  elasticsearchRef:
    name: infoline-es                      # ECK câble TLS + credentials automatiquement
  config:
    filebeat:
      # Un seul input filestream lit TOUS les logs de conteneurs du nœud (tous namespaces, kube-system inclus).
      # add_kubernetes_metadata enrichit ensuite chaque ligne (pod, namespace, labels) via l'API k8s.
      # On a écarté autodiscover+hints : en 9.x les hints activent le module ES et génèrent des configs
      # multi-sections qui échouent ("more than one namespace configured"). Ce montage est plus simple et robuste.
      inputs:
      - type: filestream
        id: kubernetes-container-logs
        paths:
        - /var/log/containers/*.log
        parsers:
        - container: {}                      # dé-encapsule le format containerd ; `container` déprécié comme INPUT, valide comme PARSER
        prospector.scanner.symlinks: true    # /var/log/containers/*.log sont des symlinks vers /var/log/pods
    processors:
    - add_kubernetes_metadata:
        host: ${NODE_NAME}
        matchers:
        - logs_path:
            logs_path: /var/log/containers/
    - add_cloud_metadata: {}
    - add_host_metadata: {}
  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: filebeat
        automountServiceAccountToken: true
        terminationGracePeriodSeconds: 30
        dnsPolicy: ClusterFirstWithHostNet
        hostNetwork: true                  # autodiscover doit joindre l'API k8s
        securityContext:
          runAsUser: 0
        containers:
        - name: filebeat
          env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          volumeMounts:
          - name: varlogcontainers
            mountPath: /var/log/containers
            readOnly: true
          - name: varlogpods
            mountPath: /var/log/pods
            readOnly: true
          - name: varlibdockercontainers
            mountPath: /var/lib/docker/containers
            readOnly: true
        volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
